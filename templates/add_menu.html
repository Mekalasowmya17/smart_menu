<!DOCTYPE html>
<html>
<head>
<title>Add Dish</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Add New Dish</h3>

<form method="POST">

<div class="mb-3">
<label class="form-label">Dish Name</label>
<input type="text" name="name" class="form-control" placeholder="Enter dish name">
</div>

<div class="mb-3">
<label class="form-label">Cost</label>
<input type="number" name="cost" class="form-control" placeholder="Enter cost">
</div>

<div class="text-center">
<button class="btn btn-success">Add Dish</button>
</div>

</form>

</div>

</div>

</body>
</html>
