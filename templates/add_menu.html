<!DOCTYPE html>
<html>
<head>
<title>Select Items</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #232526, #414345);
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
    font-size: 35px;
}

.menu-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
}

.price {
    color: #ff4d4d;
    font-weight: bold;
}

.checkbox {
    position: absolute;
    top: 10px;
    right: 10px;
    transform: scale(1.3);
}

button {
    padding: 12px 25px;
    border: none;
    background: #ff4d4d;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
}

button:hover {
    background: #e60000;
}

</style>

</head>

<body>

<h1>🛒 Select Your Items</h1>

<form method="POST" action="/go_optimize">

<div class="menu-container">

{% for dish in dishes %}
<div class="card">
    
    <input type="checkbox" class="checkbox" name="items" value="{{ dish.name }}">
    
    <h3>{{ dish.name }}</h3>
    <p class="price">₹{{ dish.cost }}</p>

</div>
{% endfor %}

</div>

<br>

<button type="submit">✅ Proceed</button>

</form>

</body>
</html>
